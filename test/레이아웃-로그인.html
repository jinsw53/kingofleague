<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOAKO BOARDGAME ARCHIVE</title>
    
    <!-- 
      [파비콘 세팅] 
      별도의 이미지 파일 없이 SVG를 활용해 브라우저 탭에 게임 컨트롤러 아이콘을 표시합니다.
    -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    
    <!-- 
      [라이브러리 로드] 
      Supabase v2 SDK를 사용하여 데이터베이스 연동 및 카카오 로그인을 처리합니다.
    -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & RESET (브랜드 아이덴티티 및 초기화)
           ========================================================================== */
        :root {
            --primary: #7c3aed;       /* 보아코 퍼플 */
            --primary-dark: #5b21b6;
            --primary-light: #f5f3ff;
            --accent: #d4af37;        /* 골드 포인트 */
            --bg: #f0f2f5;            /* 네이버형 배경색 */
            --white: #ffffff;
            --border: #e4e8eb;
            --text-main: #1e293b;
            --text-gray: #64748b;
            --radius: 12px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(124, 58, 237, 0.1);
        }

        /* [전체 초기화] */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Segoe UI", Roboto, sans-serif; 
            color: var(--text-main); 
            line-height: 1.5;
            overflow-y: scroll;
        }
        ul { list-style: none; }
        a { text-decoration: none; color: inherit; }
        .inner { width: 95%; max-width: 1130px; margin: 0 auto; }

        /* ==========================================================================
           2. HEADER & SEARCH BAR (네이버 포털 스타일)
           ========================================================================== */
        .header { background-color: var(--white); border-bottom: 1px solid var(--border); padding: 20px 0; }
        .header .inner { display: flex; align-items: center; gap: 25px; }
        
        .logo { 
            font-size: 36px; font-weight: 900; color: var(--primary); letter-spacing: -2px; 
            flex-shrink: 0; cursor: pointer; user-select: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo:hover { transform: scale(1.05); }

        .search-area { flex: 1; display: flex; justify-content: flex-start; }
        .search-box { 
            width: 100%; max-width: 580px; height: 54px; border: 2px solid var(--primary); 
            display: flex; border-radius: 4px; overflow: hidden; background: var(--white); 
            box-shadow: var(--shadow-md); 
        }
        .search-box input { flex: 1; border: none; padding: 0 20px; outline: none; font-size: 17px; font-weight: 600; }
        .btn-search { 
            width: 60px; background: var(--primary); border: none; color: white; 
            cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; 
        }

        /* ==========================================================================
           3. NAVIGATION MENU
           ========================================================================== */
        .nav { background-color: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .menu-list { display: flex; gap: 35px; height: 56px; align-items: center; }
        .menu-item { 
            font-size: 15px; font-weight: 700; color: #444; cursor: pointer; 
            display: flex; align-items: center; gap: 8px; transition: all 0.2s; 
            height: 100%; border-bottom: 2px solid transparent; 
        }
        .menu-item:hover, .menu-item.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* ==========================================================================
           4. MAIN CONTENT & SIDEBAR
           ========================================================================== */
        .container { padding: 25px 0 100px 0; }
        .flex-container { display: flex; gap: 25px; align-items: flex-start; }

        .main-content { flex: 1; min-width: 0; }
        .main-banner { 
            height: 160px; background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); 
            border-radius: var(--radius); margin-bottom: 25px; display: flex; align-items: center; 
            justify-content: center; color: white; font-size: 32px; font-weight: 900; 
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.2); text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .section-card { 
            background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); 
            overflow: hidden; margin-bottom: 20px; animation: fadeIn 0.4s ease-out; 
            box-shadow: var(--shadow-sm); 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-header { 
            padding: 18px 25px; font-size: 17px; font-weight: 800; border-bottom: 1px solid #f1f5f9; 
            color: var(--primary-dark); display: flex; justify-content: space-between; align-items: center; background: #fafafa; 
        }
        .card-body { padding: 30px; }

        /* [팀 대시보드 및 멤버 리스트] */
        .team-profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .team-logo-preview { width: 110px; height: 110px; border-radius: 18px; object-fit: contain; background: #f8fafc; border: 1px solid var(--border); padding: 10px; }
        
        .member-list { margin-top: 15px; border: 1px solid #f1f5f9; border-radius: 12px; overflow: hidden; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 25px; border-bottom: 1px solid #f1f5f9; background: #fff; }
        .member-info { display: flex; align-items: center; gap: 15px; }
        .member-icon { width: 36px; height: 36px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .member-name { font-weight: 700; color: #334155; font-size: 16px; }
        .role-tag { font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 4px; margin-left: 8px; }
        .role-leader { background: #fff7ed; color: #f97316; border: 1px solid #ffedd5; }
        .role-member { background: #f8fafc; color: #64748b; border: 1px solid var(--border); }

        /* 버튼 스타일링 */
        .btn-action { padding: 8px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-remove { background: #fee2e2; color: #ef4444; }
        .btn-remove:hover { background: #fecaca; }
        .btn-leave { background: #f1f5f9; color: #64748b; border: 1px solid var(--border); }
        .btn-leave:hover { background: #e2e8f0; }
        .btn-primary { width: 100%; background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: 800; cursor: pointer; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-edit-small { font-size: 11px; padding: 3px 8px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; cursor: pointer; color: #64748b; font-weight: bold; }

        /* [사이드바 로그인 위젯] */
        .side-content { width: 340px; flex-shrink: 0; position: sticky; top: 81px; }
        .login-widget { background: #fff; border: 1px solid var(--border); padding: 30px; border-radius: 12px; box-shadow: var(--shadow-sm); }
        .btn-kakao { width: 100%; height: 54px; background-color: #FEE500; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 16px; color: #3c1e1e; }
        .user-avatar { width: 56px; height: 56px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--primary); }
        .badge { font-size: 12px; color: var(--primary); font-weight: 700; background: var(--primary-light); padding: 3px 10px; border-radius: 4px; display: inline-block; margin-top: 4px; }
        .btn-logout { width: 100%; padding: 12px; background: #fff; border: 1px solid var(--border); color: #94a3b8; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; }

        /* 폼 요소 */
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; color: #475569; }
        .form-group input, .form-group textarea { width: 100%; padding: 13px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-size: 15px; transition: border-color 0.2s; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); }

        .edit-mode-container { margin-top: 10px; display: none; gap: 8px; width: 100%; }
        .edit-input { flex: 1; padding: 10px; border: 2px solid var(--primary); border-radius: 8px; font-size: 14px; outline: none; }
        .btn-save-mini { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        @media (max-width: 960px) { .flex-container { flex-direction: column; } .side-content { width: 100%; order: -1; position: static; } }
    </style>
</head>
<body>

    <div id="wrap">
        <!-- 🏢 [헤더] 포털형 디자인 (로고 + 검색바) -->
        <header class="header">
            <div class="inner">
                <div onclick="window.renderPage('main')" class="logo">BOAKO</div>
                <div class="search-area">
                    <div class="search-box">
                        <input type="text" id="main-search" placeholder="보드게임 전적 및 유저 검색">
                        <button type="button" class="btn-search">🔍</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- 🗺️ [네비게이션] 상단 메뉴 바 -->
        <nav class="nav">
            <div class="inner">
                <ul class="menu-list">
                    <li class="menu-item" id="menu-boardgame" onclick="window.renderPage('boardgame')">🎮 보드게임</li>
                    <li class="menu-item" id="menu-ranking" onclick="window.renderPage('ranking')">🏆 랭킹</li>
                    <li class="menu-item" id="menu-records" onclick="window.renderPage('records')">📋 전적기록</li>
                    <li class="menu-item" id="menu-team" onclick="window.renderPage('team')">🛡️ <span id="team-menu-text">팀 창단</span></li>
                    <li class="menu-item" id="menu-cafe" onclick="window.renderPage('cafe')">☕ 카페</li>
                </ul>
            </div>
        </nav>

        <!-- 📦 [메인 콘텐츠 레이아웃] -->
        <div class="container">
            <div class="inner flex-container">
                <!-- 좌측 메인 영역 -->
                <main class="main-content" id="main-content-area"></main>

                <!-- 우측 사이드바 영역 -->
                <aside class="side-content">
                    <div class="login-widget" id="login-widget-area">
                        <div style="text-align:center; padding:20px; color:var(--text-gray);">인증 상태 확인 중...</div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================================================
           6. JAVASCRIPT MASTER LOGIC (Detailed & Robust)
           ========================================================================== */
        
        // Supabase 연동 정보
        const S_URL = 'https://qrredwrxdnvqwdxzanba.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFycmVkd3J4ZG52cXdkeHphbmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjYxNjEsImV4cCI6MjA5Mjg0MjE2MX0.RrDMN1uxGe9YoonomO-Ibq_dhyaSaKMa7B05i-j0LuY';
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        // 전역 상태
        let currentUser = null;
        let userTeamInfo = null; // { type: 'LEADER' | 'MEMBER', team: object, nickname: string }
        let teamMembers = [];

        /**
         * [사용자 상태 갱신] 로그인 여부 및 팀 소속 권한을 실시간으로 확인합니다.
         */
        async function refreshUserStatus(user) {
            currentUser = user;
            const menuTxt = document.getElementById('team-menu-text');
            
            if (!user) {
                userTeamInfo = null;
                if (menuTxt) menuTxt.innerText = "팀 창단";
                renderLoginWidget();
                return;
            }

            try {
                // 1. 프로필 닉네임 조회
                const { data: profile, error: pErr } = await supabaseClient.from('profiles').select('full_name').eq('id', user.id).maybeSingle();
                const nickname = profile?.full_name || user.user_metadata.full_name;
                currentUser.nickname = nickname;

                // 2. 팀장 권한 체크 (Teams 테이블)
                const { data: leaderTeam, error: tErr } = await supabaseClient.from('teams').select('*').eq('owner_id', user.id).maybeSingle();
                if (leaderTeam) {
                    userTeamInfo = { type: 'LEADER', team: leaderTeam, nickname: nickname };
                    if (menuTxt) menuTxt.innerText = "팀 메뉴";
                    await fetchTeamMembers(leaderTeam.team_name);
                } else {
                    // 3. 일반 팀원 체크 (Team_members 테이블)
                    const { data: memEntry } = await supabaseClient.from('team_members').select('team_name').eq('player_name', nickname).maybeSingle();
                    if (memEntry) {
                        const { data: memberTeam } = await supabaseClient.from('teams').select('*').eq('team_name', memEntry.team_name).maybeSingle();
                        if (memberTeam) {
                            userTeamInfo = { type: 'MEMBER', team: memberTeam, nickname: nickname };
                            if (menuTxt) menuTxt.innerText = "팀 메뉴";
                            await fetchTeamMembers(memberTeam.team_name);
                        }
                    } else {
                        userTeamInfo = null;
                        if (menuTxt) menuTxt.innerText = "팀 창단";
                    }
                }
            } catch (e) { 
                console.error("인증 처리 중 치명적 오류:", e); 
            }
            renderLoginWidget();
        }

        /**
         * [팀원 리스트 로드] 현재 속한 팀의 모든 멤버 데이터를 가져옵니다.
         */
        async function fetchTeamMembers(teamName) {
            const { data, error } = await supabaseClient.from('team_members').select('*').eq('team_name', teamName);
            if (!error) teamMembers = data || [];
        }

        /**
         * [사이드바 렌더링] 로그인 전/후의 위젯 화면을 교체합니다.
         */
        function renderLoginWidget() {
            const area = document.getElementById('login-widget-area');
            if (!currentUser) {
                area.innerHTML = `
                    <div class="login-before">
                        <p style="font-weight:700; margin-bottom:10px;">로그인이 필요합니다</p>
                        <p style="font-size:14px; color:var(--text-gray); margin-bottom:25px; line-height:1.4;">보아코 아카이브 서비스를<br>더 안전하고 편리하게 이용하세요.</p>
                        <button class="btn-kakao" onclick="window.handleLogin()">🟡 카카오 로그인</button>
                    </div>`;
            } else {
                area.innerHTML = `
                    <div class="user-profile" style="text-align:center;">
                        <div class="user-avatar" style="margin: 0 auto 15px;">👤</div>
                        <div style="margin-bottom:5px;"><strong style="font-size:18px;">${currentUser.nickname}</strong></div>
                        <span class="badge">BTL 정식 멤버</span>
                        <div style="margin-top:20px; display:flex; gap:8px;">
                            <button class="btn-edit-small" style="flex:1; height:36px;" onclick="window.changeNickname()">수정</button>
                            <button class="btn-edit-small" style="flex:1; height:36px;" onclick="window.handleLogout()">로그아웃</button>
                        </div>
                    </div>`;
            }
        }

        /**
         * [화면 렌더링 시스템] 메뉴 클릭 시 메인 영역의 콘텐츠를 동적으로 생성합니다.
         */
        window.renderPage = async function(pageId) {
            const container = document.getElementById('main-content-area');
            
            // 네비게이션 활성화 표시
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            const active = document.getElementById(pageId === 'team' ? 'menu-team' : `menu-${pageId}`);
            if (active) active.classList.add('active');

            let html = '';

            switch(pageId) {
                case 'team':
                    if (!currentUser) {
                        html = `<section class="section-card"><div class="card-body" style="text-align:center; padding:80px 0;"><h3>로그인이 필요한 서비스입니다.</h3><p style="color:var(--text-gray); margin-top:10px;">팀 창단 및 관리는 카카오 로그인 후 가능합니다.</p></div></section>`;
                        break;
                    }
                    await refreshUserStatus(currentUser);

                    if (userTeamInfo) {
                        const { team, type, nickname } = userTeamInfo;
                        const isLeader = type === 'LEADER';
                        
                        // 멤버 리스트 HTML 구축 (방출/탈퇴 버튼 분기)
                        const mHtml = teamMembers.map(m => {
                            let actionBtn = '';
                            if (isLeader && m.player_name !== nickname) {
                                actionBtn = `<button class="btn-action btn-remove" onclick="window.removeMember('${m.player_name}')">방출</button>`;
                            }
                            if (!isLeader && m.player_name === nickname) {
                                actionBtn = `<button class="btn-action btn-leave" onclick="window.leaveTeam()">팀 탈퇴</button>`;
                            }
                            return `
                            <div class="member-item">
                                <div class="member-info">
                                    <div class="member-icon">${m.role === 'LEADER' ? '👑' : '👤'}</div>
                                    <div><span class="member-name">${m.player_name}</span><span class="role-tag ${m.role==='LEADER'?'role-leader':'role-member'}">${m.role}</span></div>
                                </div>
                                ${actionBtn}
                            </div>`;
                        }).join('');

                        html = `
                        <div class="main-banner">${team.team_name}</div>
                        <section class="section-card">
                            <div class="card-header">나의 팀 대시보드</div>
                            <div class="card-body">
                                <div class="team-profile-header">
                                    <img src="${team.logo_url || 'https://via.placeholder.com/110'}" class="team-logo-preview" alt="로고">
                                    <div class="team-info-txt">
                                        <h2>${team.team_name}</h2>
                                        <p style="color: var(--primary); font-weight: 800; font-style: italic;">"${team.team_motto || '슬로건이 없습니다.'}"</p>
                                        ${isLeader ? `<button class="btn-edit-small" style="margin-top:5px;" onclick="window.toggleEdit('motto')">슬로건 수정</button>` : ''}
                                        <div id="motto-edit-area" class="edit-mode-container">
                                            <input type="text" id="motto-input" class="edit-input" value="${team.team_motto || ''}">
                                            <button class="btn-save-mini" onclick="window.saveTeamInfo('team_motto')">저장</button>
                                        </div>
                                    </div>
                                </div>
                                <div style="margin-top:25px; border-top:1px solid #f1f5f9; padding-top:20px;">
                                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                        <h4 style="font-weight:900;">🛡️ 팀 소개</h4>
                                        ${isLeader ? `<button class="btn-edit-small" onclick="window.toggleEdit('desc')">소개 수정</button>` : ''}
                                    </div>
                                    <p id="desc-display" style="color:var(--text-gray); font-size:14px; white-space:pre-wrap; line-height:1.6;">${team.team_desc || '등록된 내용이 없습니다.'}</p>
                                    <div id="desc-edit-area" class="edit-mode-container" style="flex-direction:column;">
                                        <textarea id="desc-input" class="edit-input" rows="5">${team.team_desc || ''}</textarea>
                                        <button class="btn-save-mini" style="margin-top:10px; align-self:flex-end;" onclick="window.saveTeamInfo('team_desc')">저장하기</button>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <section class="section-card">
                            <div class="card-header">팀원 목록 (${teamMembers.length}명)</div>
                            <div class="card-body">
                                ${isLeader ? `
                                <div style="margin-bottom:20px; display:flex; gap:10px;">
                                    <input type="text" id="new-mem-name" style="flex:1; padding:12px; border:1px solid var(--border); border-radius:8px;" placeholder="초대할 닉네임을 정확히 입력">
                                    <button class="btn-primary" style="width:auto; padding:0 30px;" onclick="window.addMember()">초대</button>
                                </div>` : ''}
                                <div class="member-list">${mHtml || '<p style="text-align:center; padding:30px; color:#cbd5e1;">팀원이 아직 없습니다.</p>'}</div>
                            </div>
                        </section>`;
                    } else {
                        // 팀이 없는 경우: 창단 신청 폼
                        html = `
                        <div class="main-banner">🛡️ 팀 창단</div>
                        <section class="section-card">
                            <div class="card-header">새로운 전설의 시작 | 창단 신청</div>
                            <div class="card-body">
                                <form onsubmit="window.submitFounding(event)">
                                    <div class="form-group"><label>팀 이름 (필수, 변경 불가)</label><input type="text" id="f_name" required placeholder="예: 블랙 타이거즈"></div>
                                    <div class="form-group"><label>팀 슬로건</label><input type="text" id="f_motto" placeholder="한 줄의 강력한 포부"></div>
                                    <div class="form-group"><label>팀 로고 (이미지 필수)</label><input type="file" id="f_logo" accept="image/*" required></div>
                                    <div class="form-group"><label>팀 상세 소개</label><textarea id="f_desc" rows="5" placeholder="팀의 역사나 목표를 들려주세요."></textarea></div>
                                    <button type="submit" id="btn-found" class="btn-primary">창단 신청 및 승인 요청</button>
                                </form>
                            </div>
                        </section>`;
                    }
                    break;
                case 'ranking':
                    html = `<div class="main-banner">🏆 통합 랭킹</div><section class="section-card"><div class="card-header">실시간 아카이브 랭킹</div><div class="card-body"><p>BGA 경기 데이터를 실시간으로 집계 중입니다. 잠시만 기다려주세요.</p></div></section>`;
                    break;
                case 'records':
                    html = `<div class="main-banner">📋 전적기록</div><section class="section-card"><div class="card-header">최근 경기 아카이브</div><div class="card-body"><p>확장 프로그램을 통해 수집된 최신 전적을 불러오는 중입니다.</p></div></section>`;
                    break;
                case 'main':
                default:
                    html = `
                    <div class="main-banner">BOAKO ARCHIVE</div>
                    <section class="section-card">
                        <div class="card-header">환영합니다!</div>
                        <div class="card-body" style="text-align:center; padding:60px 0;">
                            <p style="font-size:18px; font-weight:700;">데이터 기반 보드게임 매거진, 보아코 아카이브입니다.</p>
                            <p style="color:var(--text-gray); margin-top:10px;">이곳에서 당신의 모든 승리가 명예로운 기록으로 남게 됩니다.</p>
                        </div>
                    </section>`;
            }
            container.innerHTML = html;
        };

        /**
         * [팀 창단 처리] 
         * [중요] SQL 트리거가 존재하므로, JS에서는 Teams에만 데이터를 넣습니다. 
         * 그럼 DB가 알아서 team_members에 팀장 정보를 등록합니다. (중복 등록 에러 방지)
         */
        window.submitFounding = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-found');
            const name = document.getElementById('f_name').value.trim();
            const motto = document.getElementById('f_motto').value.trim();
            const desc = document.getElementById('f_desc').value.trim();
            const file = document.getElementById('f_logo').files[0];
            
            try {
                btn.disabled = true; btn.innerText = "데이터 전송 중...";
                const nick = currentUser.nickname;

                // 1. 로고 이미지 업로드 (Storage)
                const fName = `${Date.now()}.${file.name.split('.').pop()}`;
                const { error: upErr } = await supabaseClient.storage.from('teams').upload(fName, file);
                if (upErr) throw upErr;
                const { data: uData } = supabaseClient.storage.from('teams').getPublicUrl(fName);
                
                // 2. Teams 테이블 저장 (DB)
                // [소장님] 이 요청 하나로 팀이 생성되고, 트리거가 팀장 등록까지 끝냅니다.
                const { error: dbErr } = await supabaseClient.from('teams').insert([{
                    team_name: name, 
                    owner_id: currentUser.id, 
                    leader_name: nick, 
                    team_motto: motto, 
                    team_desc: desc, 
                    logo_url: uData.publicUrl
                }]);
                
                if (dbErr) {
                    if (dbErr.code === '23505') throw new Error("이미 사용 중인 팀 이름입니다.");
                    throw dbErr;
                }
                
                alert("✅ 팀 창단이 완료되었습니다! (트리거 자동 등록 완료)");
                window.renderPage('team');
            } catch (err) { 
                alert("창단 실패: " + err.message); 
            } finally { 
                btn.disabled = false; btn.innerText = "창단 신청 및 승인 요청"; 
            }
        };

        /* [수정 및 관리 기능 그룹] */
        window.toggleEdit = (type) => {
            const area = document.getElementById(`${type}-edit-area`);
            const display = document.getElementById(`${type}-display`);
            const isNone = area.style.display === 'none' || area.style.display === '';
            area.style.display = isNone ? (type === 'desc' ? 'flex' : 'block') : 'none';
            if (display) display.style.display = isNone ? 'none' : 'block';
        };

        window.saveTeamInfo = async (col) => {
            const val = document.getElementById(col==='team_motto'?'motto-input':'desc-input').value;
            const { error } = await supabaseClient.from('teams').update({ [col]: val }).eq('owner_id', currentUser.id);
            if (error) alert("수정 실패: " + error.message); 
            else { alert("✅ 성공적으로 저장되었습니다."); window.renderPage('team'); }
        };

        window.addMember = async () => {
            const nick = document.getElementById('new-mem-name').value.trim();
            if (!nick) return alert("초대할 닉네임을 입력하세요.");
            
            // 일반 팀원으로 추가 (role: MEMBER)
            const { error } = await supabaseClient.from('team_members').insert([{ 
                team_name: userTeamInfo.team.team_name, 
                player_name: nick, 
                role: 'MEMBER' 
            }]);
            
            if (error) {
                alert("등록 실패: 이미 팀에 소속된 유저이거나 닉네임이 정확하지 않습니다.");
            } else {
                alert(`✅ ${nick}님이 팀에 합류했습니다.`);
                window.renderPage('team');
            }
        };

        window.removeMember = async (nick) => {
            if (!confirm(`${nick}님을 정말로 방출하시겠습니까?`)) return;
            const { error } = await supabaseClient.from('team_members')
                .delete()
                .eq('team_name', userTeamInfo.team.team_name)
                .eq('player_name', nick);
            if (error) alert("방출 실패: " + error.message);
            else window.renderPage('team');
        };

        window.leaveTeam = async () => {
            if (!confirm("정말로 팀을 탈퇴하시겠습니까?")) return;
            const { error } = await supabaseClient.from('team_members')
                .delete()
                .eq('team_name', userTeamInfo.team.team_name)
                .eq('player_name', currentUser.nickname);
            if (error) alert("탈퇴 실패: " + error.message);
            else location.reload();
        };

        window.changeNickname = async () => {
            const n = prompt("새로운 활동 닉네임을 입력하세요", currentUser.nickname);
            if (n && n.trim()) { 
                const { error } = await supabaseClient.from('profiles').upsert({ id: currentUser.id, full_name: n.trim() });
                if (error) alert("닉네임 변경 실패");
                else location.reload(); 
            }
        };

        // 인증 핸들러
        window.handleLogin = () => supabaseClient.auth.signInWithOAuth({ 
            provider: 'kakao', 
            options: { redirectTo: window.location.origin + window.location.pathname } 
        });
        window.handleLogout = () => { supabaseClient.auth.signOut(); location.reload(); };

        /**
         * [앱 시작점]
         */
        window.onload = async () => {
            // 1. 초기 세션 확인
            const { data: { session } } = await supabaseClient.auth.getSession();
            await refreshUserStatus(session?.user);
            
            // 2. 실시간 인증 상태 변화 감지
            supabaseClient.auth.onAuthStateChange((_, s) => refreshUserStatus(s?.user));
            
            // 3. 기본 메인 페이지 로드
            window.renderPage('main');
        };
    </script>
</body>
</html>
