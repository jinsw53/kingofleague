<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOAKO BOARDGAME ARCHIVE</title>
    <!-- 파비콘 오류 해결을 위한 이모지 파비콘 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 1. 전체 초기화 및 기본 폰트 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #f0f2f5; 
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Segoe UI", Roboto, sans-serif; 
            color: #222; 
            line-height: 1.5;
        }
        ul { list-style: none; }
        a { text-decoration: none; color: inherit; }

        /* 2. 유동형 너비 설정 */
        .inner { 
            width: 95%; 
            max-width: 1130px; 
            margin: 0 auto; 
        }

        /* 3. 헤더 디자인 (네이버형 포털 레이아웃) */
        .header { 
            background-color: #fff; 
            border-bottom: 1px solid #e4e8eb; 
            padding: 20px 0; 
        }
        .header .inner { 
            display: flex; 
            align-items: center; 
            gap: 25px; 
        }
        .logo { 
            font-size: 36px; 
            font-weight: 900; 
            color: #7c3aed; 
            letter-spacing: -2px; 
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
        }
        .search-area { 
            flex: 1; 
            display: flex; 
            justify-content: flex-start; 
        }
        .search-box { 
            width: 100%; 
            max-width: 580px; 
            height: 54px; 
            border: 2px solid #7c3aed; 
            display: flex; 
            background: #fff; 
            border-radius: 4px;
            overflow: hidden;
        }
        .search-box input { 
            flex: 1; 
            border: none; 
            padding: 0 20px; 
            outline: none; 
            font-size: 17px; 
            font-weight: 600;
        }
        .btn-search { 
            width: 60px; 
            background: #7c3aed; 
            border: none; 
            color: white; 
            cursor: pointer; 
            font-size: 22px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 4. 네비게이션 메뉴 */
        .nav { 
            background-color: #fff; 
            border-bottom: 1px solid #e4e8eb; 
        }
        .menu-list { 
            display: flex; 
            gap: 35px; 
            height: 56px; 
            align-items: center; 
        }
        .menu-item { 
            font-size: 15px; 
            font-weight: 700; 
            color: #444; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            padding: 10px 0;
            transition: color 0.2s;
            height: 100%;
            border-bottom: 2px solid transparent;
        }
        .menu-item:hover, .menu-item.active { color: #7c3aed; border-bottom: 2px solid #7c3aed; }

        /* 5. 메인 레이아웃 컨테이너 */
        .container { 
            padding: 25px 0 100px 0; 
        }
        .flex-container { 
            display: flex; 
            gap: 25px; 
        }

        /* 6. 메인 콘텐츠 영역 */
        .main-content { 
            flex: 1; 
            min-width: 0; 
        }
        .main-banner { 
            height: 160px; 
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); 
            border-radius: 12px; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-size: 32px; 
            font-weight: 900; 
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.2);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .section-card { 
            background: #fff; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            overflow: hidden;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-header { 
            padding: 20px 25px; 
            font-size: 18px; 
            font-weight: 800; 
            border-bottom: 1px solid #f1f5f9; 
            color: #5b21b6; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-body { 
            min-height: 450px; 
            padding: 30px; 
        }

        /* 폼 요소 스타일 */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; color: #475569; font-size: 14px; }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; font-size: 15px;
        }
        .btn-submit { 
            width: 100%; background: #7c3aed; color: #fff; border: none; padding: 15px; border-radius: 8px; 
            font-size: 16px; font-weight: 800; cursor: pointer; transition: background 0.2s;
        }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* 팀 대시보드 전용 스타일 */
        .team-profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .team-logo-preview { width: 100px; height: 100px; border-radius: 15px; object-fit: contain; background: #f8fafc; border: 1px solid #e2e8f0; }
        .team-info-txt h2 { font-size: 24px; font-weight: 900; color: #1e293b; }
        
        /* 인라인 수정 UI */
        .editable-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 5px; }
        .btn-edit-small { font-size: 11px; padding: 2px 8px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 4px; cursor: pointer; color: #64748b; font-weight: bold; }
        .btn-edit-small:hover { background: #e2e8f0; color: #7c3aed; }
        
        .edit-mode-container { margin-top: 10px; display: none; gap: 8px; width: 100%; }
        .edit-input { flex: 1; padding: 10px; border: 2px solid #7c3aed; border-radius: 8px; font-size: 14px; outline: none; }
        .btn-save-mini { padding: 10px 20px; background: #7c3aed; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cancel-mini { padding: 10px 20px; background: #94a3b8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 7. 사이드바 콘텐츠 */
        .side-content { 
            width: 340px; 
            flex-shrink: 0; 
        }
        .login-widget { 
            background: #fff; 
            border: 1px solid #e2e8f0; 
            padding: 25px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
        }
        .btn-kakao { 
            width: 100%; 
            height: 52px; 
            background-color: #FEE500; 
            border: none; 
            border-radius: 6px; 
            font-weight: 800; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            font-size: 16px;
            color: #3c1e1e;
        }
        .user-profile { display: none; }
        .user-info { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .user-avatar { width: 52px; height: 52px; background: #ede9fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #7c3aed; }
        .user-txt strong { display: block; font-size: 17px; }
        .badge { font-size: 12px; color: #7c3aed; font-weight: 700; background: #f5f3ff; padding: 2px 8px; border-radius: 4px; }
        .btn-logout { width: 100%; padding: 12px; background: #fff; border: 1px solid #e2e8f0; color: #94a3b8; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; }

        @media (max-width: 960px) {
            .flex-container { flex-direction: column; }
            .side-content { width: 100%; order: -1; }
        }
    </style>
</head>
<body>

    <div id="wrap">
        <!-- 헤더 영역 -->
        <header class="header">
            <div class="inner">
                <a href="javascript:void(0)" onclick="window.renderPage('main')" class="logo">BOAKO</a>
                <div class="search-area">
                    <div class="search-box">
                        <input type="text" id="main-search" placeholder="보드게임 전적 및 유저 검색">
                        <button type="button" class="btn-search">🔍</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- 네비게이션 영역 -->
        <nav class="nav">
            <div class="inner">
                <ul class="menu-list">
                    <li class="menu-item" onclick="window.renderPage('boardgame')"><span class="ico">🎮</span>보드게임</li>
                    <li class="menu-item" id="menu-ranking" onclick="window.renderPage('ranking')"><span class="ico">🏆</span>랭킹</li>
                    <li class="menu-item" id="menu-records" onclick="window.renderPage('records')"><span class="ico">📋</span>전적기록</li>
                    <li class="menu-item" id="menu-team" onclick="window.renderPage('team')">
                        <span class="ico">🛡️</span><span id="team-menu-text">팀 창단</span>
                    </li>
                    <li class="menu-item" onclick="window.renderPage('cafe')"><span class="ico">☕</span>카페</li>
                    <li class="menu-item" onclick="window.renderPage('blog')"><span class="ico">📖</span>블로그</li>
                </ul>
            </div>
        </nav>

        <!-- 컨테이너 영역 -->
        <div class="container">
            <div class="inner flex-container">
                <!-- 메인 콘텐츠 영역 -->
                <main class="main-content" id="main-content-area"></main>
                
                <!-- 사이드바 영역 -->
                <aside class="side-content">
                    <div class="login-widget">
                        <!-- 로그인 전 -->
                        <div id="login-before" class="login-before">
                            <p style="font-size:14px; color:#64748b; margin-bottom:20px;">보아코 아카이브 서비스를<br>더 안전하고 편리하게 이용하세요.</p>
                            <button type="button" class="btn-kakao" onclick="window.handleLoginRequest()">🟡 카카오 로그인</button>
                        </div>
                        <!-- 로그인 후 -->
                        <div id="user-profile" class="user-profile">
                            <div class="user-info">
                                <div class="user-avatar">👤</div>
                                <div class="user-txt">
                                    <div class="name-box" style="display:flex; align-items:center; gap:8px;">
                                        <strong id="user-name">사용자</strong>
                                        <button style="font-size:11px; cursor:pointer;" onclick="window.changeNickname()">수정</button>
                                    </div>
                                    <span class="badge">아카이브 정식 멤버</span>
                                </div>
                            </div>
                            <button type="button" class="btn-logout" onclick="window.handleLogout()">로그아웃</button>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://qrredwrxdnvqwdxzanba.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFycmVkd3J4ZG52cXdkeHphbmJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjYxNjEsImV4cCI6MjA5Mjg0MjE2MX0.RrDMN1uxGe9YoonomO-Ibq_dhyaSaKMa7B05i-j0LuY';
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        let currentUser = null;
        let userTeamInfo = null;

        /**
         * 유저 팀 상태 확인 로직 (최종 확정된 컬럼명 기준)
         */
        async function refreshUserTeamStatus(user) {
            const menuTxt = document.getElementById('team-menu-text');
            if (!user) {
                userTeamInfo = null;
                if (menuTxt) menuTxt.innerText = "팀 창단";
                return;
            }

            try {
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('full_name')
                    .eq('id', user.id)
                    .maybeSingle();

                const currentNickname = profile?.full_name || user.user_metadata.full_name;

                // 1. 팀장 여부 확인 (owner_id 또는 leader_name 기준)
                const { data: leaderTeam } = await supabaseClient
                    .from('teams')
                    .select('*')
                    .or(`owner_id.eq.${user.id},leader_name.eq.${currentNickname}`)
                    .maybeSingle();
                
                if (leaderTeam) {
                    userTeamInfo = { type: 'LEADER', team: leaderTeam };
                    if (menuTxt) menuTxt.innerText = "팀 메뉴";
                    return;
                }

                // 2. 팀원 여부 확인 (team_members 기준)
                if (currentNickname) {
                    const { data: memberEntry } = await supabaseClient
                        .from('team_members')
                        .select('team_name')
                        .eq('player_name', currentNickname)
                        .maybeSingle();
                    
                    if (memberEntry) {
                        const { data: memberTeam } = await supabaseClient
                            .from('teams')
                            .select('*')
                            .eq('team_name', memberEntry.team_name)
                            .maybeSingle();
                        
                        if (memberTeam) {
                            userTeamInfo = { type: 'MEMBER', team: memberTeam };
                            if (menuTxt) menuTxt.innerText = "팀 메뉴";
                            return;
                        }
                    }
                }
                
                userTeamInfo = null;
                if (menuTxt) menuTxt.innerText = "팀 창단";
            } catch (e) {
                console.log("팀 데이터 조회 중 오류 발생: ", e.message);
            }
        }

        /**
         * 페이지 렌더링 시스템
         */
        window.renderPage = async function(pageId) {
            const container = document.getElementById('main-content-area');
            let content = '';
            
            // 네비게이션 상태 동기화
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            const activeMenu = document.getElementById(pageId === 'team' ? 'menu-team' : `menu-${pageId}`);
            if (activeMenu) activeMenu.classList.add('active');
            
            switch(pageId) {
                case 'ranking':
                    content = `<div class="main-banner">🏆 실시간 랭킹</div><section class="section-card"><div class="card-header">아카이브 통합 랭킹</div><div class="card-body"><p>데이터를 불러오는 중입니다...</p></div></section>`;
                    container.innerHTML = content;
                    break;
                case 'records':
                    content = `<div class="main-banner">📋 전적기록</div><section class="section-card"><div class="card-header">개인 및 팀 전적</div><div class="card-body"><p>최근 경기 데이터를 수집 중입니다.</p></div></section>`;
                    container.innerHTML = content;
                    break;
                case 'team':
                    if (!currentUser) {
                        content = `<div class="main-banner">🛡️ 팀 서비스</div><div style="padding:60px; text-align:center; background:white; border-radius:12px; border:1px solid #e2e8f0;"><h3>로그인이 필요합니다</h3><p style="margin-top:10px; color:#64748b;">팀 서비스는 카카오 로그인 후 이용 가능합니다.</p></div>`;
                        container.innerHTML = content;
                        break;
                    }
                    await refreshUserTeamStatus(currentUser);

                    if (userTeamInfo) {
                        const { team, type } = userTeamInfo;
                        const isLeader = type === 'LEADER';
                        
                        content = `
                        <div class="main-banner">🛡️ 팀 메뉴</div>
                        <section class="section-card">
                            <div class="card-header">나의 팀 대시보드</div>
                            <div class="card-body">
                                <div class="team-profile-header">
                                    <img src="${team.logo_url || 'https://via.placeholder.com/100'}" class="team-logo-preview" alt="팀 로고">
                                    <div class="team-info-txt">
                                        <h2>${team.team_name}</h2>
                                        
                                        <!-- 팀 모토(슬로건) 수정 영역 -->
                                        <div class="editable-row" id="motto-display-area">
                                            <p id="team-motto-text" style="color: #7c3aed; font-weight: bold; font-style: italic; font-size: 15px;">"${team.team_motto || '슬로건이 없습니다.'}"</p>
                                            ${isLeader ? `<button class="btn-edit-small" onclick="window.toggleTeamEdit('motto')">수정</button>` : ''}
                                        </div>
                                        <div id="motto-edit-area" class="edit-mode-container">
                                            <input type="text" id="motto-input" class="edit-input" value="${team.team_motto || ''}" placeholder="새 슬로건 입력">
                                            <button class="btn-save-mini" onclick="window.saveTeamInfo('team_motto')">저장</button>
                                            <button class="btn-cancel-mini" onclick="window.toggleTeamEdit('motto')">취소</button>
                                        </div>

                                        <span class="badge" style="margin-top:8px; display:inline-block;">${isLeader ? '👑 팀 리더' : '👤 팀 멤버'}</span>
                                    </div>
                                </div>

                                <div style="display:grid; grid-template-columns:1fr; gap:15px; margin-top:20px;">
                                    <div style="padding:20px; background:#f8fafc; border-radius:12px; text-align:center; border:1px solid #f1f5f9;">
                                        <div style="font-size:12px; color:#64748b; font-weight:bold; margin-bottom:5px;">공식 성적</div>
                                        <div style="font-size:24px; font-weight:900; color:#1e293b;">업데이트 준비 중</div>
                                    </div>
                                </div>

                                <div style="margin-top:30px; padding:20px; border-top:1px solid #f1f5f9;">
                                    <div class="editable-row" style="justify-content: space-between; margin-bottom:15px;">
                                        <h4 style="font-size:15px; color:#475569; font-weight:800;">🛡️ 팀 소개</h4>
                                        ${isLeader ? `<button class="btn-edit-small" onclick="window.toggleTeamEdit('desc')">소개 수정</button>` : ''}
                                    </div>
                                    
                                    <!-- 팀 소개 수정 영역 -->
                                    <div id="desc-display-area">
                                        <p style="color:#4b5563; font-size:14px; line-height:1.7; white-space: pre-wrap;">${team.team_desc || '등록된 소개글이 없습니다.'}</p>
                                    </div>
                                    <div id="desc-edit-area" class="edit-mode-container" style="flex-direction:column;">
                                        <textarea id="desc-input" class="edit-input" rows="6" style="width:100%;">${team.team_desc || ''}</textarea>
                                        <div style="display:flex; gap:8px; margin-top:12px; justify-content: flex-end;">
                                            <button class="btn-save-mini" onclick="window.saveTeamInfo('team_desc')">저장하기</button>
                                            <button class="btn-cancel-mini" onclick="window.toggleTeamEdit('desc')">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>`;
                    } else {
                        // 팀 창단 양식
                        content = `
                        <div class="main-banner">🛡️ 팀 창단</div>
                        <section class="section-card">
                            <div class="card-header">새로운 팀 창단 신청</div>
                            <div class="card-body">
                                <form id="founding-form" onsubmit="window.submitTeamFounding(event)">
                                    <div class="form-group">
                                        <label>팀 이름 (필수)</label>
                                        <input type="text" id="team_name" placeholder="멋진 팀 이름을 지어주세요" required>
                                    </div>
                                    <div class="form-group">
                                        <label>팀 슬로건 (한 줄 각오)</label>
                                        <input type="text" id="team_motto_input" placeholder="예: 우리는 지지 않는다">
                                    </div>
                                    <div class="form-group">
                                        <label>팀 로고 이미지 (필수)</label>
                                        <input type="file" id="team_logo" accept="image/*" required>
                                        <p style="font-size:12px; color:#94a3b8; margin-top:6px;">투명 배경의 PNG 이미지를 권장합니다.</p>
                                    </div>
                                    <div class="form-group">
                                        <label>팀 소개</label>
                                        <textarea id="team_desc_input" rows="5" placeholder="우리 팀을 자유롭게 소개해 주세요."></textarea>
                                    </div>
                                    <button type="submit" id="btn-submit-team" class="btn-submit">팀 창단 신청하기</button>
                                </form>
                            </div>
                        </section>`;
                    }
                    container.innerHTML = content;
                    break;
                case 'main':
                default:
                    container.innerHTML = `<div class="main-banner">BOAKO ARCHIVE</div><section class="section-card"><div class="card-header">환영합니다!</div><div class="card-body"><p>보드게임 전적 관리를 시작해보세요. 당신의 모든 승리가 이곳에 기록됩니다.</p></div></section>`;
                    break;
            }
        };

        /**
         * 편집 모드 토글 (motto / desc)
         */
        window.toggleTeamEdit = function(type) {
            const displayArea = document.getElementById(`${type}-display-area`);
            const editArea = document.getElementById(`${type}-edit-area`);
            
            if (editArea.style.display === 'flex' || editArea.style.display === 'block') {
                editArea.style.display = 'none';
                displayArea.style.display = (type === 'motto' ? 'flex' : 'block');
            } else {
                editArea.style.display = (type === 'motto' ? 'flex' : 'block');
                displayArea.style.display = 'none';
            }
        };

        /**
         * 팀 정보 업데이트 처리 (team_motto, team_desc)
         */
        window.saveTeamInfo = async function(columnName) {
            if (!userTeamInfo || userTeamInfo.type !== 'LEADER') return;
            
            const fieldKey = (columnName === 'team_motto' ? 'motto' : 'desc');
            const newValue = document.getElementById(`${fieldKey}-input`).value;
            
            try {
                // owner_id(또는 leader_name)를 키로 사용하여 업데이트
                const { error } = await supabaseClient
                    .from('teams')
                    .update({ [columnName]: newValue })
                    .eq('owner_id', currentUser.id);
                
                if (error) throw error;
                
                alert("✅ 성공적으로 저장되었습니다.");
                window.renderPage('team');
            } catch (err) {
                console.error("저장 오류:", err);
                alert("저장 중 오류가 발생했습니다: " + err.message);
            }
        };

        /**
         * 팀 창단 처리
         */
        window.submitTeamFounding = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-team');
            const teamName = document.getElementById('team_name').value;
            const motto = document.getElementById('team_motto_input').value;
            const desc = document.getElementById('team_desc_input').value;
            const logoFile = document.getElementById('team_logo').files[0];
            
            if (!currentUser) return alert("로그인 세션이 만료되었습니다.");

            try {
                btn.disabled = true;
                btn.innerText = "처리 중...";
                
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('full_name')
                    .eq('id', currentUser.id)
                    .maybeSingle();
                
                const nickname = profile?.full_name || currentUser.user_metadata.full_name;

                // 1. 이미지 업로드
                const fileExt = logoFile.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                const { error: uploadError } = await supabaseClient.storage.from('teams').upload(fileName, logoFile);
                if (uploadError) throw uploadError;
                
                const { data: urlData } = supabaseClient.storage.from('teams').getPublicUrl(fileName);
                
                // 2. DB 저장
                const { error: dbError } = await supabaseClient.from('teams').insert([{
                    team_name: teamName,
                    owner_id: currentUser.id, 
                    leader_name: nickname,
                    team_motto: motto,
                    team_desc: desc,
                    logo_url: urlData.publicUrl
                }]);
                
                if (dbError) throw dbError;
                
                alert("✅ 팀 창단이 완료되었습니다!");
                window.renderPage('team');
            } catch (err) {
                alert("창단 실패: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "팀 창단 신청하기";
            }
        };

        /**
         * 유저 세션 및 프로필 동기화
         */
        async function updateAuthUI(user) {
            const loginBefore = document.getElementById('login-before');
            const userProfile = document.getElementById('user-profile');
            const userName = document.getElementById('user-name');

            if (user) {
                currentUser = user;
                if (loginBefore) loginBefore.style.display = 'none';
                if (userProfile) userProfile.style.display = 'block';
                
                let displayName = user.user_metadata.full_name || "사용자";
                try {
                    const { data: profile } = await supabaseClient.from('profiles').select('full_name').eq('id', user.id).maybeSingle();
                    if (profile?.full_name) displayName = profile.full_name;
                    else await supabaseClient.from('profiles').upsert({ id: user.id, full_name: displayName });
                } catch (e) {}
                
                if (userName) userName.innerText = displayName;
                await refreshUserTeamStatus(user);
            } else {
                currentUser = null;
                if (loginBefore) loginBefore.style.display = 'block';
                if (userProfile) userProfile.style.display = 'none';
                await refreshUserTeamStatus(null);
            }
        }

        window.changeNickname = async function() {
            if (!currentUser) return;
            const newName = prompt("새 닉네임을 입력하세요.");
            if (!newName || !newName.trim()) return;
            await supabaseClient.from('profiles').update({ full_name: newName.trim() }).eq('id', currentUser.id);
            location.reload();
        };

        window.handleLoginRequest = async function() {
            await supabaseClient.auth.signInWithOAuth({ 
                provider: 'kakao',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        };
        
        window.handleLogout = async function() { 
            await supabaseClient.auth.signOut(); 
            location.reload(); 
        };

        window.onload = async () => {
            window.renderPage('main');
            const { data: { session } } = await supabaseClient.auth.getSession();
            await updateAuthUI(session?.user);
            
            supabaseClient.auth.onAuthStateChange(async (evt, sess) => {
                await updateAuthUI(sess?.user);
            });
        };
    </script>
</body>
</html>
