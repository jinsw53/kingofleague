<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #ffffff;
      color: #333333;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 20px;
      margin: 0;
      color: #1976d2;
    }
    .header p {
      font-size: 13px;
      color: #666666;
      margin: 5px 0 0 0;
    }
    .feature-box {
      background-color: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #eeeeee;
    }
    .feature-box ul {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
      color: #444444;
    }
    .feature-box li {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }
    .feature-box li:last-child {
      margin-bottom: 0;
    }
    .feature-box li::before {
      content: "✨";
      margin-right: 8px;
      font-size: 14px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #1565c0;
    }
    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
      color: #999999;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>BOAKO RECORDER</h1>
    <p>팀 리그 전적 자동화 시스템</p>
  </div>

  <div class="feature-box">
    <ul>
      <li>일반 게임 및 토너먼트 자동 기록</li>
      <li>BOAKO 전용 경기 필터링 지원</li>
      <li>나의 '첫 승' 업적 자동 보관</li>
      <li>우클릭으로 언제든 아카이브 접속</li>
    </ul>
  </div>

  <button id="archive-btn" class="btn">아카이브 전체 기록 보기 🚀</button>

  <div class="footer">
    버전 2.16 | BOAKO Team League
  </div>

  <script src="popup.js"></script>
</body>
</html>
